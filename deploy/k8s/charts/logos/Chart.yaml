apiVersion: v2
name: logos
description: Logos Platform - Semantic logging and analysis platform
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: log-processor
    version: 0.1.0
    repository: file://./log-processor
    condition: log-processor.enabled
  - name: log-analyzer
    version: 0.1.0
    repository: file://./log-analyzer
    condition: log-analyzer.enabled
  - name: frontend
    version: 0.1.0
    repository: file://./frontend
    condition: frontend.enabled
