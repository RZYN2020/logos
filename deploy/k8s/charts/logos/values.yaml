# Logos Platform Configuration

global:
  logLevel: "info"
  namespace: "logging-system"

# Log Processor Configuration
log-processor:
  enabled: true
  replicaCount: 3
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  config:
    kafkaBrokers: "kafka:9092"
    elasticsearchEndpoints: "elasticsearch:9200"

# Log Analyzer Configuration
log-analyzer:
  enabled: true
  replicaCount: 2
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8080
    loadBalancerIP: ""
    externalTrafficPolicy: Cluster
  config:
    elasticsearchEndpoints: "elasticsearch:9200"

# Frontend Configuration
frontend:
  enabled: true
  replicaCount: 2
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 250m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 3000
    loadBalancerIP: ""
    externalTrafficPolicy: Cluster
  config:
    apiEndpoint: "http://log-analyzer:8080"

# Etcd Configuration
etcd:
  auth:
    rbac:
      create: false
  replicaCount: 1
  persistence:
    size: 10Gi

# Kafka Configuration
kafka:
  replicas: 1
  persistence:
    size: 50Gi

# Elasticsearch Configuration
elasticsearch:
  replicas: 1
  persistence:
    size: 100Gi
