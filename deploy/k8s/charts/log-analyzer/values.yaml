replicaCount: 2

image:
  repository: golang
  tag: "1.21-alpine"
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

service:
  type: ClusterIP
  port: 8080
  loadBalancerIP: ""
  externalTrafficPolicy: Cluster

config:
  elasticsearchEndpoints: "elasticsearch:9200"
  logLevel: "info"
