apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "log-analyzer.fullname" . }}
  labels:
    {{- include "log-analyzer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "log-analyzer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "log-analyzer.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          command: ["sh", "-c"]
          args: ["cd /app && go run ./cmd/server/main.go"]
          volumeMounts:
            - name: log-analyzer-source
              mountPath: /app
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: ELASTICSEARCH_ENDPOINTS
              value: {{ .Values.config.elasticsearchEndpoints }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel }}
      volumes:
        - name: log-analyzer-source
          hostPath:
            path: /Users/eka/Code/logos/log-analyzer
