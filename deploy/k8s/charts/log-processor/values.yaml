replicaCount: 3

image:
  repository: logos/log-processor
  tag: "1.0.0"
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 1000m
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /health
    port: 9090
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: 9090
  initialDelaySeconds: 5
  periodSeconds: 5

service:
  type: ClusterIP
  port: 9090

config:
  kafkaBrokers: "kafka:9092"
  elasticsearchEndpoints: "elasticsearch:9200"
  logLevel: "info"
