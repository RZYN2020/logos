apiVersion: v1
kind: ConfigMap
metadata:
  name: log-sdk-source
  namespace: logos-system
data:
  main.go: |
    package main
    import ("encoding/json"; "log"; "net/http"; "os")
    func main() {
        http.HandleFunc("/healthz", func(w http.ResponseWriter, r *http.Request) {
            json.NewEncoder(w).Encode(map[string]string{"status": "healthy"})
        })
        http.HandleFunc("/readyz", func(w http.ResponseWriter, r *http.Request) {
            json.NewEncoder(w).Encode(map[string]string{"status": "ready"})
        })
        http.HandleFunc("/api/v1/log", func(w http.ResponseWriter, r *http.Request) {
            w.Header().Set("Content-Type", "application/json")
            json.NewEncoder(w).Encode(map[string]interface{}{"status": "logged"})
        })
        http.HandleFunc("/api/v1/batch", func(w http.ResponseWriter, r *http.Request) {
            w.Header().Set("Content-Type", "application/json")
            json.NewEncoder(w).Encode(map[string]interface{}{"status": "batch_accepted"})
        })
        port := os.Getenv("PORT")
        if port == "" { port = "8080" }
        log.Printf("Server starting on port %s", port)
        log.Fatal(http.ListenAndServe(":"+port, nil))
    }
