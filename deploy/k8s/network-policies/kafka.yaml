apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-communication
  namespace: logging-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: log-sdk
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: log-processor
      ports:
        - protocol: TCP
          port: 9092
