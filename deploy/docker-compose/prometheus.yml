global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'flink'
    static_configs:
      - targets: ['flink-jobmanager:8081']

  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch-0:9200']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-0:9092']

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:16686']
