name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'log-processor/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'log-processor/**'
  release:
    types: [published]

env:
  GO_VERSION: '1.21'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/log-processor

jobs:
  # ==================== Test Job ====================
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: log-processor

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: log-processor/go.sum

      - name: Download dependencies
        run: go mod download -x

      - name: Run go fmt
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Go code is not formatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: log-processor
          args: --timeout=5m

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: log-processor/coverage.out
          flags: log-processor
          name: codecov-log-processor
          fail_ci_if_error: false

      - name: Run benchmarks
        run: go test -bench=. -benchmem -benchtime=1s ./...

  # ==================== Build Job ====================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: log-processor

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: log-processor/go.sum

      - name: Get version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [[ $GITHUB_REF == refs/heads/main ]]; then
            VERSION="main-$(git rev-parse --short HEAD)"
          else
            VERSION="develop-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.Version=${{ steps.version.outputs.version }}" \
            -o log-processor \
            cmd/job/main.go

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: log-processor-linux-amd64
          path: log-processor/log-processor
          retention-days: 30

  # ==================== Docker Build Job ====================
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: log-processor-linux-amd64
          path: log-processor/

      - name: Make binary executable
        run: chmod +x log-processor/log-processor

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: log-processor
          file: log-processor/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== Security Scan Job ====================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: log-processor

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ==================== Deploy Job (Main only) ====================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, docker, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://your-deployment-url.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: log-processor-linux-amd64
          path: log-processor/

      - name: Make binary executable
        run: chmod +x log-processor/log-processor

      - name: Deploy to Kubernetes (example)
        run: |
          echo "Deploying to Kubernetes..."
          # kubectl apply -f log-processor/deploy/kubernetes/
          # kubectl rollout restart deployment/log-processor
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

      - name: Notify deployment success
        run: |
          echo "Deployment completed successfully!"

  # ==================== Documentation Job ====================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Generate Go documentation
        run: |
          go install golang.org/x/pkgsite/cmd/pkgsite@latest
          pkgsite -http localhost:8080 &
          sleep 5
          curl -s http://localhost:8080/github.com/log-system/log-processor/log-processor > /dev/null

      - name: Check documentation coverage
        run: |
          go doc ./... > /dev/null
          echo "Documentation check passed"
