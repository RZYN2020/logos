name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ==================== Build Release Binaries ====================
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: log-processor

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: log-processor/go.sum

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build for all platforms
        run: |
          # Linux amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o log-processor-linux-amd64 \
            cmd/job/main.go

          # Linux arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o log-processor-linux-arm64 \
            cmd/job/main.go

          # macOS amd64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o log-processor-darwin-amd64 \
            cmd/job/main.go

          # macOS arm64
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o log-processor-darwin-arm64 \
            cmd/job/main.go

          # Windows amd64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o log-processor-windows-amd64.exe \
            cmd/job/main.go

      - name: Create checksums
        run: |
          cd log-processor
          sha256sum log-processor-* > SHA256SUMS

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            log-processor/log-processor-*
            log-processor/SHA256SUMS
          retention-days: 30

  # ==================== Build and Push Docker Image ====================
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: log-processor/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: log-processor
          file: log-processor/Dockerfile
          push: true
          tags: |
            ghcr.io/log-system/log-processor/log-processor:${{ steps.version.outputs.version }}
            ghcr.io/log-system/log-processor/log-processor:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== Create GitHub Release ====================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: release-artifacts/

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Changes

            This release includes updates to the Log Processor ETL pipeline.

            ### Features
            - Enhanced log parsing with support for multiple formats
            - Advanced filtering capabilities
            - Semantic enrichment for log entries
            - Text analysis and entity extraction
            - Transformation rules engine

            ### Installation

            Download the binary for your platform and verify the checksum:
            ```bash
            sha256sum -c SHA256SUMS
            ```

            ### Docker

            Pull the Docker image:
            ```bash
            docker pull ghcr.io/log-system/log-processor/log-processor:${{ steps.version.outputs.version }}
            ```

            ### Kubernetes

            Deploy to Kubernetes:
            ```bash
            kubectl apply -f deploy/kubernetes/
            ```
          files: |
            release-artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true

  # ==================== Notify ====================
  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [release]
    if: always()

    steps:
      - name: Get version
        run: echo "Release ${{ github.ref_name }} completed with status: ${{ needs.release.result }}"

      - name: Notify success
        if: needs.release.result == 'success'
        run: echo "Release published successfully!"

      - name: Notify failure
        if: needs.release.result == 'failure'
        run: |
          echo "Release failed!"
          exit 1
